<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Shield: Bureaucracy Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Inter:wght@400;700&display=swap');
        
        :root {
            --paper-bg: #e2e8f0;
            --desk-bg: #1e293b;
            --stamp-red: #ef4444;
            --stamp-green: #22c55e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-container {
            width: 100vw;
            height: 100vh;
            background: var(--desk-bg);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .screen {
            display: none;
            flex: 1;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .screen.active {
            display: flex;
        }

        /* Gaya Kertas Postingan ala Papers Please */
        .post-paper {
            width: 380px;
            min-height: 480px;
            background: #f8fafc;
            color: #1e293b;
            padding: 30px;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.3);
            border: 1px solid #cbd5e1;
            cursor: grab;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            font-family: 'Special Elite', cursive;
            transition: transform 0.1s ease;
            user-select: none;
        }

        .post-paper:active {
            cursor: grabbing;
            z-index: 20;
        }

        /* Area Stempel */
        .stamp-zone {
            position: absolute;
            bottom: 40px;
            width: 220px;
            height: 150px;
            border: 4px dashed rgba(255,255,255,0.2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.5rem;
            transition: all 0.3s;
        }

        .stamp-approve {
            right: 10%;
            color: var(--stamp-green);
            background: rgba(34, 197, 94, 0.05);
        }

        .stamp-deny {
            left: 10%;
            color: var(--stamp-red);
            background: rgba(239, 68, 68, 0.05);
        }

        .zone-highlight {
            background: rgba(255,255,255,0.1);
            transform: scale(1.1);
            border-color: currentColor;
        }

        /* Header Birokrasi */
        .office-header {
            background: #0f172a;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid #334155;
            width: 100%;
        }

        .status-badge {
            background: #334155;
            padding: 5px 15px;
            border-radius: 4px;
            font-family: 'Special Elite', cursive;
            font-size: 0.9rem;
        }

        /* Efek Stempel Setelah Selesai */
        .stamped-mark {
            position: absolute;
            top: 20px;
            right: 20px;
            border: 5px solid;
            padding: 5px 15px;
            font-size: 2rem;
            font-weight: bold;
            opacity: 0.8;
            transform: rotate(-15deg);
            pointer-events: none;
        }

        .stamped-approve { color: var(--stamp-green); border-color: var(--stamp-green); }
        .stamped-deny { color: var(--stamp-red); border-color: var(--stamp-red); }

    </style>
</head>
<body>

    <div class="game-container">
        <!-- HEADER -->
        <div class="office-header">
            <div class="flex items-center gap-4">
                <span class="text-xl font-bold tracking-tighter">MINISTRY OF SOCIAL MEDIA</span>
                <span id="player-display" class="status-badge text-blue-400">PENGAMAT: -</span>
            </div>
            <div class="flex items-center gap-8 font-bold">
                <div class="text-yellow-500">POIN: <span id="score-val" class="tabular-nums">0</span></div>
                <div class="text-red-500">JAM: <span id="time-val" class="tabular-nums">08:00</span></div>
            </div>
        </div>

        <!-- LOBBY -->
        <div id="screen-lobby" class="screen active">
            <h1 class="text-7xl font-black mb-4 italic" style="font-family: 'Special Elite';">SOCIAL SHIELD</h1>
            <p class="text-slate-400 mb-12 italic">Glory to the Internet. Masukkan identitas anda.</p>
            
            <input type="text" id="name-input" placeholder="NAMA PETUGAS" class="mb-8 px-8 py-4 bg-slate-800 border-2 border-slate-600 text-white font-bold text-center w-80 focus:outline-none focus:border-blue-500">
            
            <button onclick="initGame()" class="px-16 py-4 bg-blue-700 hover:bg-blue-600 font-bold text-xl border-b-4 border-blue-900 transition-all">MULAI SHIFT</button>
        </div>

        <!-- GAMEPLAY -->
        <div id="screen-game" class="screen">
            <!-- Instruksi -->
            <div class="absolute top-10 text-slate-500 italic pointer-events-none">
                Seret dokumen ke area yang tepat untuk memproses.
            </div>

            <!-- Area Drop -->
            <div id="zone-deny" class="stamp-zone stamp-deny">BLOKIR [LEFT]</div>
            <div id="zone-approve" class="stamp-zone stamp-approve">SETUJU [RIGHT]</div>

            <!-- Dokumen (Akan di-generate JS) -->
            <div id="paper-container"></div>
        </div>

        <!-- RESULT -->
        <div id="screen-result" class="screen">
            <h2 class="text-5xl font-bold mb-4" style="font-family: 'Special Elite';">SHIFT SELESAI</h2>
            <div class="bg-slate-800 p-8 w-96 border-2 border-slate-700 mb-8">
                <p class="mb-2 flex justify-between">Total Diproses: <span id="stat-total">0</span></p>
                <p class="mb-6 flex justify-between">Kesalahan: <span id="stat-wrong" class="text-red-400">0</span></p>
                <div class="text-4xl font-bold text-center text-green-400 border-t-2 border-slate-600 pt-4" id="stat-salary">Rp 0</div>
            </div>
            <button onclick="location.reload()" class="px-12 py-3 bg-slate-700 hover:bg-slate-600 font-bold">KEMBALI KE POS</button>
        </div>
    </div>

    <script>
        const database = [
            { user: "User_88", text: "Halo semuanya! Selamat pagi dan tetap semangat ya.", safe: true },
            { user: "Bot_X", text: "DAPATKAN HADIAH 1M SEKARANG JUGA! KLIK LINK INI!!!", safe: false },
            { user: "Student_01", text: "Mengapa matahari sangat panas? Berikut adalah penjelasannya.", safe: true },
            { user: "TrollMaster", text: "Kamu semua bodoh dan tidak tahu apa-apa! Pergi sana!", safe: false },
            { user: "News_Daily", text: "Pemerintah mengumumkan kebijakan baru mengenai pajak.", safe: true },
            { user: "Spammer_99", text: "BELI FOLLOWER MURAH! DM UNTUK HARGA TERBAIK!!!", safe: false },
            { user: "Science_Lover", text: "Teori relativitas Einstein menjelaskan tentang ruang waktu.", safe: true },
            { user: "Hacker_Z", text: "Download file ini untuk cheat game gratis. 100% work.", safe: false }
        ];

        let score = 0;
        let wrong = 0;
        let total = 0;
        let timeLeft = 60;
        let isDragging = false;
        let currentPaper = null;
        let startX, startY;

        function initGame() {
            const name = document.getElementById('name-input').value || "ANONIM";
            document.getElementById('player-display').innerText = "PETUGAS: " + name.toUpperCase();
            document.getElementById('screen-lobby').classList.remove('active');
            document.getElementById('screen-game').classList.add('active');
            
            spawnPaper();
            const timer = setInterval(() => {
                timeLeft--;
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                document.getElementById('time-val').innerText = `16:${seconds < 10 ? '0' + seconds : seconds}`;
                
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    showResult();
                }
            }, 1000);
        }

        function spawnPaper() {
            const container = document.getElementById('paper-container');
            container.innerHTML = '';
            
            const data = database[Math.floor(Math.random() * database.length)];
            const paper = document.createElement('div');
            paper.className = 'post-paper';
            paper.id = 'active-paper';
            paper.dataset.safe = data.safe;
            
            paper.innerHTML = `
                <div class="border-b-2 border-slate-300 mb-4 pb-2 text-xs opacity-50">DOC_TYPE: SOCIAL_FEED_v4</div>
                <div class="mb-4">
                    <div class="text-xs font-bold uppercase tracking-widest text-slate-400">Pengirim:</div>
                    <div class="text-lg">${data.user}</div>
                </div>
                <div class="mb-8">
                    <div class="text-xs font-bold uppercase tracking-widest text-slate-400">Isi Konten:</div>
                    <div class="text-xl leading-relaxed">"${data.text}"</div>
                </div>
                <div class="mt-auto text-[10px] italic text-slate-400">Tarik dokumen ke stempel yang sesuai.</div>
            `;

            container.appendChild(paper);
            currentPaper = paper;

            // Logika Dragging
            paper.addEventListener('mousedown', startDrag);
            window.addEventListener('mousemove', drag);
            window.addEventListener('mouseup', stopDrag);
        }

        function startDrag(e) {
            isDragging = true;
            startX = e.clientX - currentPaper.offsetLeft;
            startY = e.clientY - currentPaper.offsetTop;
            currentPaper.style.transition = 'none';
        }

        function drag(e) {
            if (!isDragging) return;
            
            const x = e.clientX - startX;
            const y = e.clientY - startY;
            
            currentPaper.style.left = x + 'px';
            currentPaper.style.top = y + 'px';

            // Highlight zone
            const screenWidth = window.innerWidth;
            if (e.clientX > screenWidth * 0.7) {
                document.getElementById('zone-approve').classList.add('zone-highlight');
            } else if (e.clientX < screenWidth * 0.3) {
                document.getElementById('zone-deny').classList.add('zone-highlight');
            } else {
                document.querySelectorAll('.stamp-zone').forEach(z => z.classList.remove('zone-highlight'));
            }
        }

        function stopDrag(e) {
            if (!isDragging) return;
            isDragging = false;
            
            const screenWidth = window.innerWidth;
            const isSafe = currentPaper.dataset.safe === "true";
            
            if (e.clientX > screenWidth * 0.7) {
                processResult(isSafe === true);
            } else if (e.clientX < screenWidth * 0.3) {
                processResult(isSafe === false);
            } else {
                // Balik ke tengah kalau tidak di-drop di area stempel
                currentPaper.style.transition = 'all 0.3s';
                currentPaper.style.left = '50%';
                currentPaper.style.top = '50%';
            }
            
            document.querySelectorAll('.stamp-zone').forEach(z => z.classList.remove('zone-highlight'));
        }

        function processResult(correct) {
            total++;
            if (correct) {
                score += 100;
            } else {
                wrong++;
                score = Math.max(0, score - 50);
            }
            
            document.getElementById('score-val').innerText = score;
            spawnPaper();
        }

        function showResult() {
            document.getElementById('screen-game').classList.remove('active');
            document.getElementById('screen-result').classList.add('active');
            
            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-wrong').innerText = wrong;
            document.getElementById('stat-salary').innerText = "Rp " + (score * 1000).toLocaleString('id-ID');
        }
    </script>
</body>
</html>
