<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Shield: Bureaucracy Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --paper-bg: #f8fafc;
            --desk-bg: #0f172a;
            --navy-outline: #1e293b;
            --stamp-red: #ef4444;
            --stamp-green: #22c55e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--desk-bg);
            color: #f1f5f9;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-container {
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .screen {
            display: none;
            flex: 1;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .screen.active {
            display: flex;
        }

        /* Kertas Dokumen Terupdate */
        .post-paper {
            width: 400px;
            min-height: 520px;
            background: var(--paper-bg);
            color: #1e293b;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 6px solid var(--navy-outline);
            border-radius: 32px; /* Sudut tumpul */
            cursor: grab;
            position: absolute;
            left: 50%;
            top: 45%;
            transform: translate(-50%, -50%);
            z-index: 10;
            font-family: 'Special Elite', cursive;
            transition: transform 0.1s ease, box-shadow 0.2s ease;
            user-select: none;
        }

        .post-paper:active {
            cursor: grabbing;
            z-index: 20;
            transform: translate(-50%, -50%) scale(1.02);
            box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.6);
        }

        /* Area Stempel yang Lebih Besar */
        .stamp-zone {
            position: absolute;
            bottom: 5vh;
            width: 300px; /* Lebih lebar */
            height: 180px; /* Lebih tinggi */
            border: 6px dashed rgba(255,255,255,0.15);
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.8rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .stamp-approve {
            right: 8%;
            color: var(--stamp-green);
            background: rgba(34, 197, 94, 0.05);
        }

        .stamp-deny {
            left: 8%;
            color: var(--stamp-red);
            background: rgba(239, 68, 68, 0.05);
        }

        .zone-highlight {
            background: rgba(255,255,255,0.1);
            transform: scale(1.1);
            border-color: currentColor;
            box-shadow: 0 0 40px currentColor;
        }

        .stamp-icon {
            font-size: 3rem;
            margin-bottom: 8px;
        }

        /* Header Birokrasi */
        .office-header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            width: 100%;
            z-index: 50;
        }

        .status-badge {
            background: #1e293b;
            padding: 8px 20px;
            border-radius: 12px;
            font-family: 'Special Elite', cursive;
            font-size: 1rem;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Efek Stempel */
        .stamped-mark {
            position: absolute;
            top: 30px;
            right: 30px;
            border: 8px solid;
            padding: 10px 25px;
            font-size: 2.5rem;
            font-weight: 900;
            opacity: 0.8;
            transform: rotate(-20deg);
            pointer-events: none;
            border-radius: 10px;
        }

    </style>
</head>
<body>

    <div class="game-container">
        <!-- HEADER -->
        <div class="office-header">
            <div class="flex items-center gap-6">
                <span class="text-2xl font-black tracking-tighter text-blue-500">SOCIAL SHIELD</span>
                <span id="player-display" class="status-badge text-slate-300">PETUGAS: -</span>
            </div>
            <div class="flex items-center gap-12 font-bold">
                <div class="text-yellow-500 text-xl">POIN: <span id="score-val" class="tabular-nums">0</span></div>
                <div id="timer-display" class="text-red-500 text-xl font-black">JAM: <span id="time-val" class="tabular-nums">08:00</span></div>
            </div>
        </div>

        <!-- LOBBY -->
        <div id="screen-lobby" class="screen active">
            <h1 class="text-8xl font-black mb-6 italic tracking-tighter" style="font-family: 'Special Elite';">OFFICE v.2</h1>
            <p class="text-slate-400 mb-12 text-xl italic font-light">"Keamanan internet adalah tanggung jawab Anda."</p>
            
            <input type="text" id="name-input" placeholder="NAMA PETUGAS" class="mb-10 px-10 py-5 bg-slate-800 border-4 border-slate-700 text-white font-black text-2xl text-center w-96 rounded-2xl focus:outline-none focus:border-blue-500 transition-all">
            
            <button onclick="initGame()" class="px-20 py-5 bg-blue-600 hover:bg-blue-500 font-black text-2xl rounded-2xl shadow-2xl border-b-8 border-blue-900 transition-all active:translate-y-2 active:border-b-0">MASUK SHIFT</button>
        </div>

        <!-- GAMEPLAY -->
        <div id="screen-game" class="screen">
            <!-- Instruksi -->
            <div class="absolute top-10 text-slate-500 text-lg italic pointer-events-none opacity-50">
                Seret dokumen ke stempel bawah untuk memproses.
            </div>

            <!-- Area Drop -->
            <div id="zone-deny" class="stamp-zone stamp-deny">
                <span class="stamp-icon">🚫</span>
                <span>BLOKIR</span>
            </div>
            <div id="zone-approve" class="stamp-zone stamp-approve">
                <span class="stamp-icon">✅</span>
                <span>SETUJU</span>
            </div>

            <!-- Dokumen -->
            <div id="paper-container"></div>
        </div>

        <!-- RESULT -->
        <div id="screen-result" class="screen">
            <h2 class="text-6xl font-black mb-8" style="font-family: 'Special Elite';">LAPORAN HARIAN</h2>
            <div class="bg-slate-800/50 p-12 w-[500px] rounded-3xl border-4 border-slate-700 mb-12 backdrop-blur-xl">
                <div class="space-y-6 text-2xl">
                    <p class="flex justify-between">Total Konten: <span id="stat-total" class="font-black">0</span></p>
                    <p class="flex justify-between text-red-400">Kesalahan: <span id="stat-wrong" class="font-black">0</span></p>
                    <div class="h-px bg-slate-600 my-4"></div>
                    <p class="text-sm text-slate-400 uppercase tracking-widest">Estimasi Honorarium</p>
                    <div class="text-6xl font-black text-green-400" id="stat-salary">Rp 0</div>
                </div>
            </div>
            <button onclick="location.reload()" class="px-16 py-4 bg-slate-700 hover:bg-slate-600 font-bold text-xl rounded-xl transition-all">KEMBALI KE LOBBY</button>
        </div>
    </div>

    <script>
        const database = [
            { user: "User_88", text: "Halo semuanya! Selamat pagi dan tetap semangat ya.", safe: true },
            { user: "Bot_X", text: "DAPATKAN HADIAH 1M SEKARANG JUGA! KLIK LINK INI!!!", safe: false },
            { user: "Student_01", text: "Mengapa matahari sangat panas? Berikut adalah penjelasannya.", safe: true },
            { user: "TrollMaster", text: "Kamu semua bodoh dan tidak tahu apa-apa! Pergi sana!", safe: false },
            { user: "News_Daily", text: "Pemerintah mengumumkan kebijakan baru mengenai pajak.", safe: true },
            { user: "Spammer_99", text: "BELI FOLLOWER MURAH! DM UNTUK HARGA TERBAIK!!!", safe: false },
            { user: "Science_Lover", text: "Teori relativitas Einstein menjelaskan tentang ruang waktu.", safe: true },
            { user: "Hacker_Z", text: "Download file ini untuk cheat game gratis. 100% work.", safe: false },
            { user: "Meme_Lord", text: "SKIBIDI TOILET RIZZLER FANUM TAX GYATT!!!", safe: false }
        ];

        let score = 0;
        let wrong = 0;
        let total = 0;
        let timeLeft = 60;
        let isDragging = false;
        let currentPaper = null;
        let startX, startY;

        function initGame() {
            const name = document.getElementById('name-input').value || "ANONIM";
            document.getElementById('player-display').innerText = "PETUGAS: " + name.toUpperCase();
            document.getElementById('screen-lobby').classList.remove('active');
            document.getElementById('screen-game').classList.add('active');
            
            spawnPaper();
            const timer = setInterval(() => {
                timeLeft--;
                const seconds = timeLeft % 60;
                document.getElementById('time-val').innerText = `16:${seconds < 10 ? '0' + seconds : seconds}`;
                
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    showResult();
                }
            }, 1000);
        }

        function spawnPaper() {
            const container = document.getElementById('paper-container');
            container.innerHTML = '';
            
            const data = database[Math.floor(Math.random() * database.length)];
            const paper = document.createElement('div');
            paper.className = 'post-paper';
            paper.id = 'active-paper';
            paper.dataset.safe = data.safe;
            
            // Random sedikit rotasi agar tidak kaku
            const randomRot = (Math.random() * 4 - 2);
            paper.style.transform = `translate(-50%, -50%) rotate(${randomRot}deg)`;
            
            paper.innerHTML = `
                <div class="flex justify-between items-center border-b-4 border-slate-200 mb-6 pb-2">
                    <span class="text-xs font-bold opacity-30">TYPE: FEED_DOC_V2</span>
                    <span class="text-xs font-bold opacity-30">ID: #${Math.floor(Math.random()*9000+1000)}</span>
                </div>
                <div class="mb-6">
                    <div class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 mb-1">Pengirim Data</div>
                    <div class="text-2xl font-bold border-b border-slate-100 pb-2">${data.user}</div>
                </div>
                <div class="mb-10">
                    <div class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 mb-2">Transkrip Konten</div>
                    <div class="text-2xl leading-snug italic">"${data.text}"</div>
                </div>
                <div class="mt-auto pt-4 border-t-2 border-slate-100 flex justify-center">
                    <div class="px-4 py-2 border-2 border-slate-200 rounded-full text-[10px] font-black text-slate-300">WAITING FOR ACTION</div>
                </div>
            `;

            container.appendChild(paper);
            currentPaper = paper;

            paper.addEventListener('mousedown', startDrag);
            window.addEventListener('mousemove', drag);
            window.addEventListener('mouseup', stopDrag);
        }

        function startDrag(e) {
            isDragging = true;
            startX = e.clientX - currentPaper.offsetLeft;
            startY = e.clientY - currentPaper.offsetTop;
            currentPaper.style.transition = 'none';
        }

        function drag(e) {
            if (!isDragging) return;
            
            const x = e.clientX - startX;
            const y = e.clientY - startY;
            
            currentPaper.style.left = x + 'px';
            currentPaper.style.top = y + 'px';

            const screenWidth = window.innerWidth;
            const screenHeight = window.innerHeight;

            // Highlight zone berdasarkan posisi (Kiri vs Kanan di area bawah)
            if (e.clientY > screenHeight * 0.5) {
                if (e.clientX > screenWidth * 0.6) {
                    document.getElementById('zone-approve').classList.add('zone-highlight');
                    document.getElementById('zone-deny').classList.remove('zone-highlight');
                } else if (e.clientX < screenWidth * 0.4) {
                    document.getElementById('zone-deny').classList.add('zone-highlight');
                    document.getElementById('zone-approve').classList.remove('zone-highlight');
                } else {
                    document.querySelectorAll('.stamp-zone').forEach(z => z.classList.remove('zone-highlight'));
                }
            }
        }

        function stopDrag(e) {
            if (!isDragging) return;
            isDragging = false;
            
            const screenWidth = window.innerWidth;
            const screenHeight = window.innerHeight;
            const isSafe = currentPaper.dataset.safe === "true";
            
            if (e.clientY > screenHeight * 0.5) {
                if (e.clientX > screenWidth * 0.6) {
                    processResult(isSafe === true);
                } else if (e.clientX < screenWidth * 0.4) {
                    processResult(isSafe === false);
                } else {
                    resetPaper();
                }
            } else {
                resetPaper();
            }
            
            document.querySelectorAll('.stamp-zone').forEach(z => z.classList.remove('zone-highlight'));
        }

        function resetPaper() {
            currentPaper.style.transition = 'all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            currentPaper.style.left = '50%';
            currentPaper.style.top = '45%';
        }

        function processResult(correct) {
            total++;
            if (correct) {
                score += 100;
            } else {
                wrong++;
                score = Math.max(0, score - 50);
            }
            
            document.getElementById('score-val').innerText = score;
            
            // Efek kertas terbang keluar
            currentPaper.style.transition = 'all 0.4s ease-in';
            currentPaper.style.transform = `translate(-50%, 150%) rotate(${Math.random()*40-20}deg)`;
            currentPaper.style.opacity = '0';
            
            setTimeout(spawnPaper, 400);
        }

        function showResult() {
            document.getElementById('screen-game').classList.remove('active');
            document.getElementById('screen-result').classList.add('active');
            
            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-wrong').innerText = wrong;
            document.getElementById('stat-salary').innerText = "Rp " + (score * 1000).toLocaleString('id-ID');
        }
    </script>
</body>
</html>
